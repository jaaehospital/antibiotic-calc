<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>항생제 용량 계산기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF2F7;padding:12px;font-size:13px}
.wrap{max-width:520px;margin:0 auto}
.hdr{background:#1B3A5C;border-radius:14px;padding:14px 16px;margin-bottom:10px;color:#fff}
.hdr h1{font-size:16px;font-weight:700;margin-bottom:2px}
.hdr p{font-size:11px;opacity:.8;line-height:1.4}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field label{display:block;font-size:11px;color:#666;font-weight:600;margin-bottom:4px}
.field input{width:100%;padding:10px 11px;font-size:15px;border:1.5px solid #DDE2EA;border-radius:9px;background:#fff;color:#222;outline:none;-webkit-appearance:none}
.field input:focus{border-color:#2E6DA4}
.field input::placeholder{color:#C8CDD5;font-size:13px}
.sex-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sb{padding:10px 8px;border:1.5px solid #DDE2EA;border-radius:9px;background:#fff;font-size:13px;font-weight:700;color:#888;cursor:pointer;text-align:center;width:100%}
.sb.m{background:#1B3A5C;border-color:#1B3A5C;color:#fff}
.sb.f{background:#8B1A1A;border-color:#8B1A1A;color:#fff}
.crcl-panel{border-radius:12px;padding:16px 18px;margin-bottom:10px;display:none}
.crcl-panel.show{display:block}
.crcl-lbl{font-size:11px;font-weight:600;opacity:.85;letter-spacing:.4px;margin-bottom:2px}
.crcl-big{font-size:64px;font-weight:900;line-height:1;letter-spacing:-2px}
.crcl-unit{font-size:12px;opacity:.8;margin-bottom:5px}
.crcl-info{font-size:12px;opacity:.9;line-height:1.5}
.bg-g{background:#1A7A3C;color:#fff}
.bg-b{background:#1B3A5C;color:#fff}
.bg-a{background:#9a5a00;color:#fff}
.bg-r{background:#8B1A1A;color:#fff}
.bg-d{background:#2C2C2C;color:#fff}
.ab-group-title{font-size:11px;font-weight:700;color:#2E6DA4;letter-spacing:.3px;margin:10px 0 6px}
.ab-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ab-idx{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ab-idx.iv{background:#E6F1FB;color:#1B3A5C}
.ab-idx.po{background:#E6F4EC;color:#1A5C3B}
.ab-row select{flex:1;font-size:13px;padding:10px 11px;border:1.5px solid #DDE2EA;border-radius:9px;background:#fff;color:#222;outline:none}
.calc-btn{width:100%;padding:15px;background:#1B3A5C;color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px}
.calc-btn:active{opacity:.85}

/* Result card */
.result-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.rc-hdr{padding:12px 14px;color:#fff}
.rc-name{font-size:15px;font-weight:700;margin-bottom:1px}
.rc-eng{font-size:10px;opacity:.8}
.rc-body{padding:12px 14px}
.ir{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:.5px solid #F0F4F8}
.ir-lbl{font-size:11px;color:#888;flex-shrink:0;width:90px}
.ir-val{font-size:13px;font-weight:600;color:#222;text-align:right;flex:1;word-break:keep-all;overflow-wrap:break-word}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin:1px}
.bOK{background:#E6F4EC;color:#1A7A3C}
.bWN{background:#FEF3E2;color:#9a5a00}
.bER{background:#FDEAEA;color:#8B1A1A}
.bBL{background:#E6F1FB;color:#1B3A5C}
.bPU{background:#EDE6FB;color:#5B1A8B}
.bGR{background:#E6F4EC;color:#1A5C3B}
.bQT{background:#FDEAEA;color:#8B1A1A}
.inf-box{background:#F0F4FA;border:1.5px solid #C5D8EF;border-radius:9px;padding:10px 12px;margin:8px 0}
.inf-ttl{font-size:10px;font-weight:700;color:#1B3A5C;letter-spacing:.3px;margin-bottom:5px}
.inf-row{font-size:12px;color:#333;line-height:1.65;padding-left:14px;position:relative;margin-bottom:2px;word-break:keep-all;overflow-wrap:break-word}
.inf-row::before{content:'→';position:absolute;left:0;color:#2E6DA4;font-weight:700}
.se-box{background:#FEF8EE;border:1px solid #f5c060;border-radius:9px;padding:9px 12px;margin-top:8px}
.se-ttl{font-size:10px;font-weight:700;color:#9a5a00;margin-bottom:4px}
.se-row{font-size:11px;color:#7a4800;line-height:1.65;padding-left:12px;position:relative;margin-bottom:2px}
.se-row::before{content:'•';position:absolute;left:2px;color:#D4780A}
.note-box{font-size:11px;color:#555;padding:8px 10px;background:#F8F9FA;border-radius:8px;margin-top:6px;line-height:1.6}
.zerb-box{background:#EDE6FB;border:1.5px solid #C0A8F0;border-radius:9px;padding:10px 12px;margin-top:8px}
.zerb-ttl{font-size:10px;font-weight:700;color:#5B1A8B;margin-bottom:5px}
.zerb-row{font-size:11px;color:#3a1060;line-height:1.65;padding-left:12px;position:relative;margin-bottom:2px}
.zerb-row::before{content:'→';position:absolute;left:0;color:#8B4AC0;font-weight:700}

/* Time picker inside result card */
.time-picker-box{background:#F0FAF4;border:1.5px solid #1A5C3B;border-radius:9px;padding:10px 12px;margin:10px 0 4px}
.time-picker-box.amber{background:#FEF8EE;border-color:#D4780A}
.time-picker-lbl{font-size:11px;font-weight:700;color:#1A5C3B;margin-bottom:7px}
.time-picker-box.amber .time-picker-lbl{color:#9a5a00}
.time-picker-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.time-picker-row label{font-size:12px;color:#333}
.time-picker-row input[type=time]{padding:8px 10px;font-size:15px;font-weight:700;border:1.5px solid #1A5C3B;border-radius:8px;background:#fff;color:#1A5C3B;outline:none;width:120px}
.time-picker-box.amber .time-picker-row input[type=time]{border-color:#D4780A;color:#9a5a00}
.time-picker-hint{font-size:10px;color:#666;margin-top:5px}
.update-btn{padding:7px 14px;font-size:12px;font-weight:700;border:none;border-radius:7px;cursor:pointer;background:#1A5C3B;color:#fff}
.time-picker-box.amber .update-btn{background:#D4780A}

/* Day schedule table */
.day-sched{margin-top:8px;border-radius:9px;overflow:hidden;border:1.5px solid #ddd}
.day-sched-ttl{font-size:11px;font-weight:700;padding:7px 12px;color:#fff}
.day-tbl{width:100%;border-collapse:collapse}
.day-tbl th{font-size:10px;font-weight:700;padding:5px 7px;text-align:center;border-bottom:1.5px solid rgba(0,0,0,0.15);color:#fff;opacity:.9}
.day-tbl th:first-child{text-align:left;width:56px;white-space:nowrap}
.day-tbl th:last-child{text-align:left}
.day-tbl td{font-size:11px;padding:7px 7px;text-align:center;border-bottom:.5px solid #E8EEF4;vertical-align:middle;line-height:1.4}
.day-tbl td:first-child{font-weight:700;text-align:left;white-space:nowrap;width:56px}
.day-tbl td:last-child{text-align:left;color:#555}
.day-tbl tr:last-child td{border-bottom:none}
.day-leg{display:flex;gap:10px;padding:6px 10px;font-size:10px;flex-wrap:wrap;border-top:.5px solid #eee;background:#FAFAFA}
.dl-i{display:flex;align-items:center;gap:4px}
.dl-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* Teico */
.teico-wrap{margin-top:8px;border-radius:9px;overflow:hidden;border:1.5px solid #1A5C3B}
.teico-ttl{background:#1A5C3B;color:#fff;font-size:11px;font-weight:700;padding:7px 12px}
.teico-tbl{width:100%;border-collapse:collapse}
.teico-tbl th{background:#E8F5EE;color:#1A5C3B;font-size:10px;font-weight:700;padding:5px 6px;text-align:center;border-bottom:1.5px solid #1A5C3B}
.teico-tbl th:first-child{text-align:left;width:56px;white-space:nowrap}
.teico-tbl td{font-size:11px;padding:6px;text-align:center;border-bottom:.5px solid #C8E6D4;color:#333;line-height:1.4}
.teico-tbl td:first-child{font-weight:700;color:#1A5C3B;text-align:left;white-space:nowrap;width:56px}
.teico-tbl tr:last-child td{border-bottom:none}
.td-ld{color:#9a5a00;font-weight:700}
.td-md{color:#1A7A3C;font-weight:700}
.td-no{color:#ccc}
.teico-leg{display:flex;gap:10px;padding:6px 10px;background:#F8FCF9;font-size:10px;flex-wrap:wrap}
.tl-i{display:flex;align-items:center;gap:4px}
.tl-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.teico-note{font-size:10px;color:#555;padding:7px 10px;background:#F0FAF4;line-height:1.6}

.reset-btn{width:100%;padding:11px;background:#EEF2F7;color:#666;border:1.5px solid #DDE2EA;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
    <h1 style="margin-bottom:0;flex-shrink:0">항생제 용량 계산기</h1>
    <span style="font-size:14px;font-weight:700;color:#4AE880;letter-spacing:.3px;white-space:nowrap">JAAE Hospital</span>
  </div>
  <p>Cockcroft-Gault CrCl · 중증 감염 최대 용량 (필요시 조절 가능) · IV 3종 + PO 1종</p>
</div>

<div class="card">
  <div class="card-title">환자 정보</div>
  <div class="g2">
    <div class="field"><label>나이 (세)</label><input type="number" id="age" placeholder="78" inputmode="numeric"></div>
    <div class="field"><label>성별</label>
      <div class="sex-row">
        <button class="sb" id="bm" onclick="setSex('M')">♂ 남</button>
        <button class="sb" id="bf" onclick="setSex('F')">♀ 여</button>
      </div>
    </div>
  </div>
  <div class="g2" style="margin-bottom:4px">
    <div class="field"><label>Cr (mg/dL)</label><input type="number" id="cr" placeholder="1.2" step="0.1" inputmode="decimal"></div>
    <div class="field"><label>체중 ABW (kg)</label><input type="number" id="wt" placeholder="58" step="0.1" inputmode="decimal"></div>
  </div>
  <div style="font-size:10px;color:#aaa;padding-left:2px">※ 키 입력 불필요 — IBW 기본값: 남성 70 kg / 여성 55 kg 자동 적용</div>
</div>

<div class="crcl-panel" id="crclPanel">
  <div class="crcl-lbl">크레아티닌 청소율 (CrCl) — Cockcroft-Gault</div>
  <div class="crcl-big" id="crclNum">—</div>
  <div class="crcl-unit">mL/min</div>
  <div class="crcl-info" id="crclInfo"></div>
</div>

<div class="card">
  <div class="card-title">항생제 선택</div>
  <div class="ab-group-title">💉 주사용 항생제 (IV) — 최대 3종</div>
  <div class="ab-row"><div class="ab-idx iv">1</div>
    <select id="iv1"><option value="">— IV 항생제 선택 —</option>
      <option value="pip">Pip/Taz (타박탐주)</option>
      <option value="mero">Meropenem (메펨주)</option>
      <option value="teico">Teicoplanin (테이코신주)</option>
      <option value="levo">Levofloxacin (레보카신주)</option>
      <option value="ceftri">Ceftriaxone (세티악손주)</option>
      <option value="cefe">Cefepime (세펨주)</option>
      <option value="ceftaz">Ceftazidime (세프타지딤주)</option>
      <option value="zerb">Zerbaxa (저박사주)</option>
      <option value="genta">Gentamicin (겐타마이신주)</option>
    </select></div>
  <div class="ab-row"><div class="ab-idx iv">2</div>
    <select id="iv2"><option value="">— 선택 안함 —</option>
      <option value="pip">Pip/Taz (타박탐주)</option>
      <option value="mero">Meropenem (메펨주)</option>
      <option value="teico">Teicoplanin (테이코신주)</option>
      <option value="levo">Levofloxacin (레보카신주)</option>
      <option value="ceftri">Ceftriaxone (세티악손주)</option>
      <option value="cefe">Cefepime (세펨주)</option>
      <option value="ceftaz">Ceftazidime (세프타지딤주)</option>
      <option value="zerb">Zerbaxa (저박사주)</option>
      <option value="genta">Gentamicin (겐타마이신주)</option>
    </select></div>
  <div class="ab-row"><div class="ab-idx iv">3</div>
    <select id="iv3"><option value="">— 선택 안함 —</option>
      <option value="pip">Pip/Taz (타박탐주)</option>
      <option value="mero">Meropenem (메펨주)</option>
      <option value="teico">Teicoplanin (테이코신주)</option>
      <option value="levo">Levofloxacin (레보카신주)</option>
      <option value="ceftri">Ceftriaxone (세티악손주)</option>
      <option value="cefe">Cefepime (세펨주)</option>
      <option value="ceftaz">Ceftazidime (세프타지딤주)</option>
      <option value="zerb">Zerbaxa (저박사주)</option>
      <option value="genta">Gentamicin (겐타마이신주)</option>
    </select></div>
  <div class="ab-group-title">💊 경구용 항생제 (PO) — 1종</div>
  <div class="ab-row"><div class="ab-idx po">4</div>
    <select id="po1"><option value="">— PO 항생제 선택 —</option>
      <option value="cipro">Ciprofloxacin (싸이플록신정)</option>
      <option value="cefac">Cefaclor (크로세프캡슐)</option>
      <option value="amox">Amoxycillin/Clavulanate (크라모넥스듀오정)</option>
      <option value="tmx">TMP/SMX (셉트린정)</option>
      <option value="mino">Minocycline (미노씬캡슐)</option>
      <option value="vanco_po">Vancomycin PO (반코진캡슐)</option>
      <option value="fluco">Fluconazole (푸루나졸정)</option>
      <option value="metro">Metronidazole (후라시닐정)</option>
    </select></div>
  <button class="calc-btn" onclick="calculate()">용량 계산하기 →</button>
</div>

<div id="results"></div>
</div>

<script>
var sex=null, lastCrcl=null;

function setSex(s){sex=s;document.getElementById('bm').className='sb'+(s==='M'?' m':'');document.getElementById('bf').className='sb'+(s==='F'?' f':'');tryCalc();}
function calcIBW(m){return m?70:55;}
function calcCG(a,c,w,m){return ((140-a)*w)/(72*c)*(m?1:0.85);}

function tryCalc(){
  var a=parseFloat(document.getElementById('age').value);
  var c=parseFloat(document.getElementById('cr').value);
  var w=parseFloat(document.getElementById('wt').value);
  var panel=document.getElementById('crclPanel');
  if(!a||!c||!w||!sex){panel.className='crcl-panel';return;}
  var male=sex==='M', ibw=calcIBW(male), wt=w<=ibw?w:ibw;
  var v=Math.round(calcCG(a,c,wt,male)*10)/10;
  lastCrcl=v;
  panel.className='crcl-panel show '+(v>=60?'bg-g':v>=40?'bg-b':v>=20?'bg-a':v>=10?'bg-r':'bg-d');
  document.getElementById('crclNum').textContent=v;
  var stg=v>=60?'정상/경도 감소':v>=40?'경도~중등도 감소':v>=20?'중등도~고도 감소':v>=10?'고도 감소':'신부전';
  document.getElementById('crclInfo').textContent=stg+' | IBW '+ibw+' kg'+(w>ibw?' → IBW 적용':'→ ABW '+w+' kg 적용');
}
['age','cr','wt'].forEach(function(id){document.getElementById(id).addEventListener('input',tryCalc);});

/* ═══════════════════════════════════════════════════════════════════════════
   DRUG DATABASE
═══════════════════════════════════════════════════════════════════════════ */
var D={
  pip:{name:'Pip/Taz',kname:'타박탐주',hdr:'#1B3A5C',vial:'4.5 g/vial (Pip 4 g + Taz 0.5 g)',
    pkpd:'Time-dependent (%T > MIC ≥ 50–100%)',elim:'신장(70%) · 담즙(20%)',qtc:false,halflife:'Piperacillin 반감기: 1.0–1.2시간 (CrCl 저하 시 3–4시간으로 연장)',
    dose:function(v){
      if(v>=40)return{d:'4.5 g',f:'q8h',t:'13.5 g/일 (3바이알)',p:'ok',pt:'✔ 표준 최대 용량',
        inf:['NS 500 mL에 2–4바이알 mix','Step 1 — Loading: 처음 100 mL → 1시간 (100 mL/h)','Step 2 — Maintenance: 나머지 400 mL → 23시간 (17 mL/h)','중증/Pseudomonas 의심: 4바이알(18 g) 고려 (CrCl ≥ 60)']};
      if(v>=20)return{d:'4.5 g',f:'q12h',t:'9 g/일 (2바이알)',p:'wn',pt:'⚠ 감량 (CrCl 20–40)',
        inf:['NS 500 mL에 2바이알 mix','Step 1 — Loading: 처음 100 mL → 1시간 (100 mL/h)','Step 2 — Maintenance: 나머지 400 mL → 23시간 (17 mL/h)']};
      if(v>=10)return{d:'2.25 g',f:'q12h',t:'4.5 g/일',p:'er',pt:'❌ 적극 감량 (CrCl <20)',
        inf:['NS 100 mL mix · 최소 3시간 천천히 주입 (CrCl<20 시 반감기 3–4h로 연장)','투여 후 신경독성(Seizure·Confusion) 주의 관찰','전해질(K⁺·Mg²⁺) 모니터링']};
      return{d:'2.25 g',f:'q12h + HD 후 추가',t:'개별화',p:'er',pt:'❌ 전문의 상담',inf:['투석 일정 고려 · Therapeutic Drug Monitoring (TDM) 권장']};
    },
    se:['Nephrotoxicity (신독성): Cr 상승 — CrCl < 40 mL/min 시 위험 증가, Cr 모니터링 필수',
        'Neurotoxicity (신경독성): 경련(Seizure)·혼돈(Confusion) — 총량 > 9 g/일 또는 CrCl < 40 시 위험, 고령(Elderly > 65세)·뇌전증(Epilepsy)·신부전(Renal failure) 동반 시 주의']},

  mero:{name:'Meropenem',kname:'메펨주',hdr:'#3B1F6E',vial:'1 g/vial, 2 g/vial',
    pkpd:'Time-dependent (%T > MIC)',elim:'신장(70%) — CrCl↓ 시 반드시 감량',qtc:false,halflife:'Meropenem 반감기: 1.0시간 (CrCl 저하 시 최대 3.8시간까지 연장) → Extended infusion 필수',
    dose:function(v){
      if(v>=51)return{d:'2 g',f:'q8h',t:'6 g/일',p:'ok',pt:'✔ 표준 최대 용량',
        inf:['NS 100 mL mix','★ Extended infusion 3시간 강력 권장 (중증 감염)',
             '→ 표준 30분 주입 대비 %T>MIC 유의하게 향상',
             '→ MIC 4 μg/mL 이상 내성균에서 목표 달성 확률(PTA) 차이 더욱 두드러짐',
             '  (PTA: Probability of Target Attainment — 1,000명 시뮬레이션 기반 목표 달성 환자 비율)',

function buildTeico(crcl, startH){
  var md,mdi,mdl,vial;
  if(crcl>=60){md=400;mdi=1;mdl='q24h';vial='400 mg × 1바이알';}
  else if(crcl>=40){md=400;mdi=2;mdl='q48h';vial='400 mg × 1바이알';}
  else if(crcl>=10){md=400;mdi=3;mdl='q72h';vial='400 mg × 1바이알';}
  else{md=200;mdi=3;mdl='q72h';vial='200 mg × 1바이알';}

  // Calculate actual dose times in absolute hours from start
  // LD: 0h, 12h, 24h from startH
  // MD: starting at 48h, every mdi*24h
  var ldOffsets=[0,12,24];
  var mdOffsets=[];
  for(var t=48;t<=144;t+=mdi*24) mdOffsets.push(t);

  // Convert offset hours to {day(1-6), hour(0-23), label}
  function offsetToDateTime(offsetH){
    var absH = startH + offsetH;          // absolute hour from midnight of Day 1
    var day = Math.floor(absH / 24) + 1;  // 1-based day
    var hour = absH % 24;                 // hour within that day (0-23)
    return {day:day, hour:hour};
  }

  // Build dose list
  var doses = [];
  ldOffsets.forEach(function(off){
    var dt = offsetToDateTime(off);
    doses.push({type:'LD', day:dt.day, hour:dt.hour, mg:400});
  });
  mdOffsets.forEach(function(off){
    var dt = offsetToDateTime(off);
    doses.push({type:'MD', day:dt.day, hour:dt.hour, mg:md});
  });

  // Format hour to Korean time string
  function fmtHour(h){
    var ap = h<12 ? '오전' : '오후';
    var h12 = h%12 || 12;
    return ap+' '+h12+'시';
  }

  function fmtDose(dose){
    var ts = fmtHour(dose.hour);
    if(dose.type==='LD')
      return '<span class="td-ld">'+dose.mg+' mg<br><small>Loading Dose (LD) ('+ts+')</small></span>';
    return '<span class="td-md">'+dose.mg+' mg<br><small>Maintenance Dose (MD) ('+ts+')</small></span>';
  }

  // Group doses by day
  var dayMap={};
  doses.forEach(function(d){
    if(!dayMap[d.day]) dayMap[d.day]=[];
    dayMap[d.day].push(d);
  });

  var rows='';
  for(var i=1;i<=6;i++){
    var ds = dayMap[i] || [];
    ds.sort(function(a,b){return a.hour-b.hour;});
    var hLD = ds.some(function(d){return d.type==='LD';});
    var hMD = ds.some(function(d){return d.type==='MD';});
    var bg  = hLD?'#FFF8E8':hMD?'#F0FAF4':'#FAFAFA';
    var cell= ds.length ? ds.map(fmtDose).join('<br>') : '<span class="td-no">—</span>';
    var tot = ds.reduce(function(s,d){return s+d.mg;},0);
    rows += '<tr style="background:'+bg+'">'+
      '<td>Day '+i+'</td>'+
      '<td>'+cell+'</td>'+
      '<td>'+(ds.length ? ds.length+'회' : '<span class="td-no">—</span>')+'</td>'+
      '<td>'+(tot ? '<strong>'+tot+' mg</strong>' : '<span class="td-no">—</span>')+'</td>'+
    '</tr>';
  }

  var startLabel = fmtHour(startH);
  var ld2 = offsetToDateTime(12); var ld3 = offsetToDateTime(24);

  return '<div class="teico-wrap">'+
    '<div class="teico-ttl">♣ 테이코플라닌 Day별 투여 스케줄 (Day 1–6)</div>'+
    '<table class="teico-tbl"><thead><tr>'+
    '<th>일자</th><th>투여 시각 및 용량</th><th>횟수</th><th>일일 합계</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="teico-leg">'+
    '<div class="tl-i"><div class="tl-dot" style="background:#FFF8E8;border:1px solid #9a5a00"></div>'+
    '<span style="color:#9a5a00;font-weight:700">Loading Dose (LD) 400 mg</span></div>'+
    '<div class="tl-i"><div class="tl-dot" style="background:#F0FAF4;border:1px solid #1A7A3C"></div>'+
    '<span style="color:#1A7A3C;font-weight:700">Maintenance Dose (MD) '+mdl+'</span></div>'+
    '<div class="tl-i" style="margin-left:auto"><span style="color:#1A5C3B;font-weight:600">'+vial+'</span></div>'+
    '</div>'+
    '<div class="teico-note">'+
    '※ Loading Dose (LD): 빠르게 목표 혈중 농도 달성을 위한 초회 고용량<br>'+
    '※ Maintenance Dose (MD): 목표 농도를 지속 유지하기 위한 정기 투여량<br>'+
    '※ Loading 시작: '+startLabel+' 기준<br>'+
    '  → 1회차: '+startLabel+' / '+
    '  2회차: Day '+ld2.day+' '+fmtHour(ld2.hour)+' / '+
    '  3회차: Day '+ld3.day+' '+fmtHour(ld3.hour)+'<br>'+
    '※ Therapeutic Drug Monitoring (TDM): Loading Dose 3회 후 4번째 투여 직전 trough 채혈 → 목표 15–30 mg/L<br>'+
    '※ 빈칸(—) = 해당 일자 투여 없음 ('+mdl+' 간격)</div></div>';
}

  }

  // Day schedule or teico schedule
  var PO_KEYS=['cipro','cefac','amox','tmx','mino','vanco_po','metro'];
  var schedHtml='';
  if(key==='teico'){
    schedHtml='<div id="sched_'+uid+'">'+buildTeico(crcl,9)+'</div>';
  } else if(d.hasTimePicker){
    schedHtml='<div id="sched_'+uid+'">'+buildDaySched(key,crcl,9)+'</div>';
  } else if(PO_KEYS.indexOf(key)>=0){
    var poSched=buildDaySched(key,crcl,9);
    if(poSched) schedHtml='<div id="sched_'+uid+'">'+poSched+'</div>';
  } else if(key==='fluco'){
    var poSched=buildDaySched(key,crcl,9);
    if(poSched) schedHtml='<div id="sched_'+uid+'">'+poSched+'</div>';
  }

  return '<div class="result-card" id="card_'+uid+'">'+
    '<div class="rc-hdr" style="background:'+d.hdr+'">'+
      '<div class="rc-name">'+d.name+'</div>'+
      '<div class="rc-eng">'+d.kname+' · '+(d.vial||d.form||'')+'</div>'+
    '</div>'+
    '<div class="rc-body">'+
      '<div class="ir"><span class="ir-lbl">1회 용량</span><span class="ir-val">'+r.d+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">투여 간격</span><span class="ir-val">'+r.f+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">1일 총량</span><span class="ir-val">'+r.t+'</span></div>'+
      '<div style="margin:7px 0 5px">'+
        '<span class="badge '+tc+'">'+r.pt+'</span>'+
        '<span class="badge '+pc+'">'+d.pkpd.split('(')[0].trim().split(' ')[0]+'-dep</span>'+
        '<span class="badge '+ec+'">'+d.elim.split('(')[0].trim().split('·')[0].trim()+' 배설</span>'+
        qt+tdmb+
      '</div>'+
      '<div class="ir"><span class="ir-lbl">PK/PD</span><span class="ir-val" style="font-size:11px;color:#555">'+d.pkpd+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">반감기 (t½)</span><span class="ir-val" style="font-size:11px;color:#333;font-weight:600;word-break:keep-all;overflow-wrap:break-word;line-height:1.5">'+d.halflife+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">배설 경로</span><span class="ir-val" style="font-size:11px;color:#555">'+d.elim+'</span></div>'+
      ibox+adm+dosenote+tdmn+zb+sebox+
      timePicker+schedHtml+
    '</div></div>';
}

/* update schedule when time changes */
function updateSched(key, crcl, uid){
  var tpId='tp_'+uid;
  var tEl=document.getElementById(tpId);
  if(!tEl) return;
  var parts=tEl.value.split(':');
  var startH=parseInt(parts[0])||9;
  var schedEl=document.getElementById('sched_'+uid);
  if(!schedEl) return;
  if(key==='teico') schedEl.innerHTML=buildTeico(crcl, startH);
  else schedEl.innerHTML=buildDaySched(key, crcl, startH);
}

/* ═══════════════════════════════════════════════════════════════════════════
   CALCULATE
═══════════════════════════════════════════════════════════════════════════ */
var UID=0;
function calculate(){
  var a=parseFloat(document.getElementById('age').value);
  var c=parseFloat(document.getElementById('cr').value);
  var w=parseFloat(document.getElementById('wt').value);
  if(!a||a<18){alert('나이를 입력해주세요');return;}
  if(!sex){alert('성별을 선택해주세요');return;}
  if(!c||c<=0){alert('Cr 수치를 입력해주세요');return;}
  if(!w||w<20){alert('체중을 입력해주세요');return;}
  var male=sex==='M', ibw=calcIBW(male), wt=w<=ibw?w:ibw;
  var crcl=Math.round(calcCG(a,c,wt,male)*10)/10;
  lastCrcl=crcl;
  var panel=document.getElementById('crclPanel');
  panel.className='crcl-panel show '+(crcl>=60?'bg-g':crcl>=40?'bg-b':crcl>=20?'bg-a':crcl>=10?'bg-r':'bg-d');
  document.getElementById('crclNum').textContent=crcl;
  var stg=crcl>=60?'정상/경도 감소':crcl>=40?'경도~중등도 감소':crcl>=20?'중등도~고도 감소':crcl>=10?'고도 감소':'신부전';
  document.getElementById('crclInfo').textContent=stg+' | IBW '+ibw+' kg'+(w>ibw?' → IBW 적용 (비만 추정)':' → ABW '+w+' kg 적용');
  var keys=[document.getElementById('iv1').value,document.getElementById('iv2').value,
    document.getElementById('iv3').value,document.getElementById('po1').value].filter(function(v){return v;});
  if(!keys.length){alert('항생제를 하나 이상 선택해주세요');return;}
  var html='';
  keys.forEach(function(k){var uid='u'+(++UID);html+=rdr(k,crcl,uid);});
  html+='<button class="reset-btn" onclick="resetAll()">↺ 다시 계산하기</button>';
  document.getElementById('results').innerHTML=html;
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function resetAll(){
  ['age','cr','wt'].forEach(function(id){document.getElementById(id).value='';});
  ['iv1','iv2','iv3','po1'].forEach(function(id){document.getElementById(id).selectedIndex=0;});
  sex=null; lastCrcl=null;
  document.getElementById('bm').className='sb';
  document.getElementById('bf').className='sb';
  document.getElementById('crclPanel').className='crcl-panel';
  document.getElementById('results').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}
