<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>항생제 용량 계산기 | JAAE Hospital</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#D8E4F0;padding:16px;font-size:13px}
.wrap{max-width:520px;margin:0 auto;background:#EEF2F7;border-radius:24px;padding:14px;box-shadow:0 4px 20px rgba(27,58,92,0.13)}
.hdr{background:#1B3A5C;border-radius:14px;padding:14px 16px;margin-bottom:10px;color:#fff;text-align:center}
.hdr-top{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:3px}
.hdr h1{font-size:16px;font-weight:700}
.hdr-jaae{font-size:14px;font-weight:700;color:#4AE880;white-space:nowrap}
.hdr p{font-size:11px;opacity:.8;line-height:1.4;text-align:center}
@media (max-width:480px){
  .hdr-top{flex-direction:column;gap:2px}
}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field label{display:block;font-size:11px;color:#666;font-weight:600;margin-bottom:4px}
.field input{width:100%;padding:10px 11px;font-size:15px;border:1.5px solid #DDE2EA;border-radius:9px;background:#fff;color:#222;outline:none;-webkit-appearance:none}
.field input:focus{border-color:#2E6DA4}
.field input::placeholder{color:#C8CDD5;font-size:13px}
.sex-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sb{padding:10px 8px;border:1.5px solid #DDE2EA;border-radius:9px;background:#fff;font-size:13px;font-weight:700;color:#888;cursor:pointer;text-align:center;width:100%}
.sb.m{background:#1B3A5C;border-color:#1B3A5C;color:#fff}
.sb.f{background:#8B1A1A;border-color:#8B1A1A;color:#fff}
/* CrCl */
.crcl-panel{border-radius:12px;margin-bottom:10px;display:none}
.crcl-panel.show{display:block}
.crcl-boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.crcl-box{background:#0000FF;color:#fff;border-radius:14px;padding:16px 10px;text-align:center}
.crcl-lbl{font-size:11px;font-weight:700;opacity:.95;margin-bottom:6px;line-height:1.35}
.crcl-big{font-size:38px;font-weight:900;line-height:1;letter-spacing:-1px}
.crcl-unit{font-size:11px;opacity:.8;margin:3px 0 8px}
.crcl-stage{font-size:11px;font-weight:700;line-height:1.35;overflow-wrap:break-word}
.crcl-info{font-size:11px;color:#666;text-align:center;padding:0 2px}
.bg-g{background:#1A7A3C;color:#fff}.bg-b{background:#1B3A5C;color:#fff}
.bg-a{background:#9a5a00;color:#fff}.bg-r{background:#8B1A1A;color:#fff}.bg-d{background:#2C2C2C;color:#fff}
/* Severity */
.sev-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.sev-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.sev-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sev-btn{padding:14px 8px;border:2px solid #DDE2EA;border-radius:11px;background:#fff;font-size:14px;font-weight:700;color:#888;cursor:pointer;text-align:center;width:100%;line-height:1.4;transition:all .15s}
.sev-btn .sev-icon{font-size:22px;display:block;margin-bottom:4px}
.sev-btn .sev-label{font-size:13px;font-weight:700;display:block}
.sev-btn .sev-sub{font-size:10px;font-weight:400;opacity:.8;display:block;margin-top:2px}
.sev-btn.sev-on{background:#8B1A1A;border-color:#8B1A1A;color:#fff}
.sev-btn.mild-on{background:#1A5C3B;border-color:#1A5C3B;color:#fff}
/* AB select */
.ab-group-title{font-size:11px;font-weight:700;color:#2E6DA4;letter-spacing:.3px;margin:10px 0 6px}
.ab-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ab-idx{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ab-idx.iv{background:#E6F1FB;color:#1B3A5C}
.ab-idx.po{background:#E6F4EC;color:#1A5C3B}
.ab-row select{flex:1;font-size:13px;padding:10px 11px;border:1.5px solid #DDE2EA;border-radius:9px;background:#fff;color:#222;outline:none}
.calc-btn{width:100%;padding:15px;background:#0000FF;color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px}
.calc-btn:active{opacity:.85}
/* Result */
.result-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.rc-hdr{padding:12px 14px;color:#fff;text-align:center}
.rc-name{font-size:15px;font-weight:700;margin-bottom:1px}
.rc-eng{font-size:10px;opacity:.8}
.rc-sev-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-top:4px}
.rc-body{padding:12px 14px}
.ir{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:.5px solid #F0F4F8}
.ir:last-of-type{border-bottom:none}
.ir-lbl{font-size:11px;color:#888;flex-shrink:0;width:90px}
.ir-val{font-size:13px;font-weight:600;color:#222;text-align:right;flex:1;word-break:keep-all;overflow-wrap:break-word}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin:1px}
.bOK{background:#E6F4EC;color:#1A7A3C}.bWN{background:#FEF3E2;color:#9a5a00}.bER{background:#FDEAEA;color:#8B1A1A}
.bBL{background:#E6F1FB;color:#1B3A5C}.bPU{background:#EDE6FB;color:#5B1A8B}.bGR{background:#E6F4EC;color:#1A5C3B}.bQT{background:#FDEAEA;color:#8B1A1A}
.inf-box{background:#F0F4FA;border:1.5px solid #C5D8EF;border-radius:9px;padding:10px 12px;margin:8px 0}
.inf-ttl{font-size:10px;font-weight:700;color:#1B3A5C;margin-bottom:5px}
.inf-row{font-size:12px;color:#333;line-height:1.65;padding-left:16px;position:relative;margin-bottom:2px;word-break:keep-all;overflow-wrap:break-word}
.inf-row::before{content:'•';position:absolute;left:0;color:#1A7A3C;font-size:14px;font-weight:700;line-height:1.4}
.se-box{background:#FEF8EE;border:1px solid #f5c060;border-radius:9px;padding:9px 12px;margin-top:8px}
.se-ttl{font-size:10px;font-weight:700;color:#9a5a00;margin-bottom:4px}
.se-row{font-size:11px;color:#7a4800;line-height:1.65;padding-left:16px;position:relative;margin-bottom:2px}
.se-row::before{content:'•';position:absolute;left:0;color:#D4780A;font-size:14px;font-weight:700;line-height:1.4}
.note-box{font-size:11px;color:#555;padding:8px 10px;background:#F8F9FA;border-radius:8px;margin-top:6px;line-height:1.6}
.zerb-box{background:#EDE6FB;border:1.5px solid #C0A8F0;border-radius:9px;padding:10px 12px;margin-top:8px}
.zerb-ttl{font-size:10px;font-weight:700;color:#5B1A8B;margin-bottom:5px}
.zerb-row{font-size:11px;color:#3a1060;line-height:1.65;padding-left:16px;position:relative;margin-bottom:2px;word-break:keep-all;overflow-wrap:break-word}
.zerb-row::before{content:'•';position:absolute;left:0;color:#1A7A3C;font-size:14px;font-weight:700;line-height:1.4}
/* Time picker */
.time-picker-box{background:#F0FAF4;border:1.5px solid #1A5C3B;border-radius:9px;padding:10px 12px;margin:10px 0 4px}
.time-picker-box.amber{background:#FEF8EE;border-color:#D4780A}
.time-picker-lbl{font-size:11px;font-weight:700;color:#1A5C3B;margin-bottom:7px}
.time-picker-box.amber .time-picker-lbl{color:#9a5a00}
.time-picker-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.time-picker-row label{font-size:12px;color:#333}
.time-picker-row input[type=time]{padding:8px 10px;font-size:15px;font-weight:700;border:1.5px solid #1A5C3B;border-radius:8px;background:#fff;color:#1A5C3B;outline:none;width:120px}
.time-picker-box.amber .time-picker-row input[type=time]{border-color:#D4780A;color:#9a5a00}
.time-picker-hint{font-size:10px;color:#666;margin-top:5px}
.update-btn{padding:7px 14px;font-size:12px;font-weight:700;border:none;border-radius:7px;cursor:pointer;background:#1A5C3B;color:#fff}
.time-picker-box.amber .update-btn{background:#D4780A}
/* Day schedule */
.day-sched{margin-top:8px;border-radius:9px;overflow:hidden;border:1.5px solid #ddd}
.day-sched-ttl{font-size:11px;font-weight:700;padding:7px 12px;color:#fff;word-break:keep-all;overflow-wrap:break-word;text-align:center;line-height:1.5}
.day-tbl{width:100%;border-collapse:collapse}
.day-tbl th{font-size:10px;font-weight:700;padding:5px 6px;text-align:center;border-bottom:1.5px solid rgba(0,0,0,0.15);color:#fff;opacity:.9;white-space:nowrap}
.day-tbl th:first-child{text-align:left;width:48px;white-space:nowrap}
.day-tbl th:nth-child(2){width:90px}
.day-tbl th:last-child{text-align:left}
.day-tbl td{font-size:11px;padding:6px 5px;text-align:center;border-bottom:.5px solid #E8EEF4;vertical-align:top;line-height:1.45;word-break:keep-all;overflow-wrap:break-word}
.day-tbl td:first-child{font-weight:700;text-align:left;white-space:nowrap;width:48px;vertical-align:middle}
.day-tbl td:nth-child(2){text-align:left;width:90px;font-weight:600;word-break:keep-all}
.day-tbl td:last-child{text-align:left;color:#555;word-break:keep-all}
.day-tbl tr:last-child td{border-bottom:none}
.day-leg{display:flex;gap:10px;padding:6px 10px;font-size:10px;flex-wrap:wrap;border-top:.5px solid #eee;background:#FAFAFA}
/* Compact PO schedule table */
.po-sched{margin-top:8px;border-radius:9px;overflow:hidden;border:1.5px solid #ddd}
.po-sched-ttl{font-size:11px;font-weight:700;padding:7px 10px;color:#fff;word-break:keep-all;text-align:center}
.po-tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.po-tbl th{font-size:10px;font-weight:700;padding:5px 6px;text-align:center;border-bottom:1.5px solid rgba(0,0,0,0.15);color:#fff;opacity:.9;overflow:hidden}
.po-tbl th:first-child{text-align:left;width:44px}
.po-tbl th:nth-child(2){width:80px}
.po-tbl th:last-child{text-align:left}
.po-tbl td{font-size:11px;padding:6px 5px;text-align:center;border-bottom:.5px solid #E8EEF4;vertical-align:top;line-height:1.45;word-break:keep-all;overflow-wrap:break-word;overflow:hidden}
.po-tbl td:first-child{font-weight:700;text-align:left;white-space:nowrap;width:44px;vertical-align:middle}
.po-tbl td:nth-child(2){text-align:left;width:80px;font-weight:600;word-break:keep-all;font-size:10px}
.po-tbl td:last-child{text-align:left;color:#555;word-break:keep-all;font-size:10px}
.po-tbl tr:last-child td{border-bottom:none}
.dl-i{display:flex;align-items:center;gap:4px}
.dl-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
/* Teico */
.teico-wrap{margin-top:8px;border-radius:9px;overflow:hidden;border:1.5px solid #1A5C3B}
.teico-ttl{background:#1A5C3B;color:#fff;font-size:11px;font-weight:700;padding:7px 12px;line-height:1.5;word-break:keep-all;text-align:center}
.teico-tbl{width:100%;border-collapse:collapse}
.teico-tbl th{background:#E8F5EE;color:#1A5C3B;font-size:10px;font-weight:700;padding:5px 6px;text-align:center;border-bottom:1.5px solid #1A5C3B}
.teico-tbl th:first-child{text-align:left;width:56px;white-space:nowrap}
.teico-tbl td{font-size:11px;padding:6px;text-align:center;border-bottom:.5px solid #C8E6D4;color:#333;line-height:1.4}
.teico-tbl td:first-child{font-weight:700;color:#1A5C3B;text-align:left;white-space:nowrap;width:56px}
.teico-tbl tr:last-child td{border-bottom:none}
.td-ld{color:#9a5a00;font-weight:700}.td-md{color:#1A7A3C;font-weight:700}.td-no{color:#ccc}
.teico-leg{display:flex;gap:10px;padding:6px 10px;background:#F8FCF9;font-size:10px;flex-wrap:wrap}
.tl-i{display:flex;align-items:center;gap:4px}
.tl-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.teico-note{font-size:10px;color:#555;padding:7px 10px;background:#F0FAF4;line-height:1.6}
.reset-btn{width:100%;padding:11px;background:#EEF2F7;color:#666;border:1.5px solid #DDE2EA;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.footer{text-align:center;padding:9px 0 5px;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div class="hdr-top">
    <h1>항생제 용량 계산기</h1>
    <span class="hdr-jaae">JAAE Hospital</span>
  </div>
  <p>Cockcroft-Gault CrCl · 3종류의 주사 항생제 + 경구용 항생제</p>
</div>

<!-- 환자 정보 -->
<div class="card">
  <div class="card-title">환자 정보</div>
  <div class="g2">
    <div class="field"><label>나이 (세)</label><input type="number" id="age" placeholder="78" inputmode="numeric"></div>
    <div class="field"><label>성별</label>
      <div class="sex-row">
        <button class="sb" id="bm" onclick="setSex('M')">♂ 남</button>
        <button class="sb" id="bf" onclick="setSex('F')">♀ 여</button>
      </div>
    </div>
  </div>
  <div class="g2" style="margin-bottom:4px">
    <div class="field"><label>Cr (mg/dL)</label><input type="number" id="cr" placeholder="1.2" step="0.1" inputmode="decimal"></div>
    <div class="field"><label>체중 ABW (kg)</label><input type="number" id="wt" placeholder="58" step="0.1" inputmode="decimal"></div>
  </div>
  <div style="font-size:10px;color:#aaa;padding-left:2px">※ IBW 기본값: 남성 70 kg / 여성 55 kg 자동 적용</div>
</div>

<!-- CrCl / eGFR 표시 -->
<div class="crcl-panel" id="crclPanel">
  <div class="crcl-boxes">
    <div class="crcl-box">
      <div class="crcl-lbl">Creatinine Clearance<br>(Cockcroft-Gault)</div>
      <div class="crcl-big" id="crclNum">—</div>
      <div class="crcl-unit">mL/min</div>
      <div class="crcl-stage" id="crclStage"></div>
    </div>
    <div class="crcl-box">
      <div class="crcl-lbl">eGFR<br>(CKD-EPI)</div>
      <div class="crcl-big" id="egfrNum">—</div>
      <div class="crcl-unit">mL/min/1.73m²</div>
      <div class="crcl-stage" id="egfrStage"></div>
    </div>
  </div>
  <div class="crcl-info" id="crclInfo"></div>
</div>

<!-- 중증도 선택 -->
<div class="sev-card">
  <div class="sev-title">감염 중증도 선택</div>
  <div class="sev-row">
    <button class="sev-btn" id="btn-sev" onclick="setSev(true)">
      <span class="sev-icon">🔴</span>
      <span class="sev-label">중증 감염</span>
      <span class="sev-sub">패혈증·중증 폐렴·HAP/VAP</span>
    </button>
    <button class="sev-btn" id="btn-mild" onclick="setSev(false)">
      <span class="sev-icon">🟡</span>
      <span class="sev-label">일반/경증 감염</span>
      <span class="sev-sub">지역사회 감염·경등도</span>
    </button>
  </div>
</div>

<!-- 항생제 선택 -->
<div class="card">
  <div class="card-title">항생제 선택</div>
  <div class="ab-group-title">💉 주사용 항생제 (IV) — 최대 3종</div>
  <div class="ab-row"><div class="ab-idx iv">1</div>
    <select id="iv1">
      <option value="">— IV 항생제 선택 —</option>
      <option value="pip">Pip/Taz (타박탐주)</option>
      <option value="mero">Meropenem (메펨주)</option>
      <option value="teico">Teicoplanin (테이코신주)</option>
      <option value="levo">Levofloxacin (레보카신주)</option>
      <option value="ceftri">Ceftriaxone (세티악손주)</option>
      <option value="cefe">Cefepime (세펨주)</option>
      <option value="ceftaz">Ceftazidime (세프타지딤주)</option>
      <option value="zerb">Zerbaxa (저박사주)</option>
      <option value="genta">Gentamicin (겐타마이신주)</option>
    </select></div>
  <div class="ab-row"><div class="ab-idx iv">2</div>
    <select id="iv2">
      <option value="">— 선택 안함 —</option>
      <option value="pip">Pip/Taz (타박탐주)</option>
      <option value="mero">Meropenem (메펨주)</option>
      <option value="teico">Teicoplanin (테이코신주)</option>
      <option value="levo">Levofloxacin (레보카신주)</option>
      <option value="ceftri">Ceftriaxone (세티악손주)</option>
      <option value="cefe">Cefepime (세펨주)</option>
      <option value="ceftaz">Ceftazidime (세프타지딤주)</option>
      <option value="zerb">Zerbaxa (저박사주)</option>
      <option value="genta">Gentamicin (겐타마이신주)</option>
    </select></div>
  <div class="ab-row"><div class="ab-idx iv">3</div>
    <select id="iv3">
      <option value="">— 선택 안함 —</option>
      <option value="pip">Pip/Taz (타박탐주)</option>
      <option value="mero">Meropenem (메펨주)</option>
      <option value="teico">Teicoplanin (테이코신주)</option>
      <option value="levo">Levofloxacin (레보카신주)</option>
      <option value="ceftri">Ceftriaxone (세티악손주)</option>
      <option value="cefe">Cefepime (세펨주)</option>
      <option value="ceftaz">Ceftazidime (세프타지딤주)</option>
      <option value="zerb">Zerbaxa (저박사주)</option>
      <option value="genta">Gentamicin (겐타마이신주)</option>
    </select></div>
  <!-- teico time picker moved to result card -->
  <div class="ab-group-title">💊 경구용 항생제 (PO) — 1종</div>
  <div class="ab-row"><div class="ab-idx po">4</div>
    <select id="po1">
      <option value="">— PO 항생제 선택 —</option>
      <option value="cipro">Ciprofloxacin (싸이플록신정)</option>
      <option value="cefac">Cefaclor (크로세프캡슐)</option>
      <option value="amox">Amoxycillin/Clavulanate (크라모넥스듀오정)</option>
      <option value="tmx">TMP/SMX (셉트린정)</option>
      <option value="mino">Minocycline (미노씬캡슐)</option>
      <option value="vanco_po">Vancomycin PO (반코진캡슐)</option>
      <option value="fluco">Fluconazole (푸루나졸정)</option>
      <option value="metro">Metronidazole (후라시닐정)</option>
    </select></div>
  <button class="calc-btn" onclick="calculate()">용량 계산하기 →</button>
</div>

<div id="results"></div>
</div>
<div class="footer">Made by Kyung Ho Shin (2026. 6)</div>

<script>
var sex=null, severeMode=null, lastCrcl=null, UID=0;

function setSex(s){
  sex=s;
  document.getElementById('bm').className='sb'+(s==='M'?' m':'');
  document.getElementById('bf').className='sb'+(s==='F'?' f':'');
  tryCalc();
}

function setSev(sev){
  severeMode=sev;
  document.getElementById('btn-sev').className='sev-btn'+(sev?' sev-on':'');
  document.getElementById('btn-mild').className='sev-btn'+(!sev?' mild-on':'');
}

function calcIBW(m){return m?70:55;}
function calcCG(a,c,w,m){return ((140-a)*w)/(72*c)*(m?1:0.85);}
// CKD-EPI 2021 (race-free) creatinine equation
function calcEGFR(a,c,m){
  var k=m?0.9:0.7, al=m?-0.302:-0.241, sexF=m?1:1.012;
  var ratio=c/k;
  var minR=Math.min(ratio,1), maxR=Math.max(ratio,1);
  return 142*Math.pow(minR,al)*Math.pow(maxR,-1.200)*Math.pow(0.9938,a)*sexF;
}
function crclStageEN(v){
  return v>=60?'Normal / mild reduction':v>=40?'Mild–moderate reduction':v>=20?'Moderate–severe reduction':v>=10?'Severe reduction':'Kidney failure';
}
function egfrStageEN(v){
  return v>=90?'G1 — Normal':v>=60?'G2 — Mildly decreased':v>=45?'G3a — Mildly-moderately decreased':v>=30?'G3b — Moderately-severely decreased':v>=15?'G4 — Severely decreased':'G5 — Kidney failure';
}

function tryCalc(){
  var a=parseFloat(document.getElementById('age').value);
  var c=parseFloat(document.getElementById('cr').value);
  var w=parseFloat(document.getElementById('wt').value);
  var panel=document.getElementById('crclPanel');
  if(!a||!c||!w||!sex){panel.className='crcl-panel';return;}
  var male=sex==='M', ibw=calcIBW(male), wt=w<=ibw?w:ibw;
  var v=Math.round(calcCG(a,c,wt,male)*10)/10;
  lastCrcl=v;
  panel.className='crcl-panel show';
  document.getElementById('crclNum').textContent=v;
  var eg=Math.round(calcEGFR(a,c,male)*10)/10;
  document.getElementById('egfrNum').textContent=eg;
  document.getElementById('crclStage').textContent=crclStageEN(v);
  document.getElementById('egfrStage').textContent=egfrStageEN(eg);
  document.getElementById('crclInfo').textContent='IBW '+ibw+' kg'+(w>ibw?' → IBW 적용':' → ABW '+w+' kg 적용');
}
['age','cr','wt'].forEach(function(id){document.getElementById(id).addEventListener('input',tryCalc);});

/* ═══════════════════════ PO COMPACT SCHEDULE ═════════════════════════════ */
function buildPOSched(key,crcl,sev,startH){
  if(!startH && startH!==0) startH=9;
  var rows=[], hdrColor='#1B3A5C', title='';

  function fmtHour(h){
    var ap=h<12?'오전':'오후', h12=h%12||12;
    return ap+' '+h12+'시';
  }

  function getDay(offsetH){
    var absH=startH+offsetH;
    return {day:Math.floor(absH/24)+1, hour:absH%24};
  }

  function addToMap(map, offsetH, data){
    var dt=getDay(offsetH);
    if(dt.day>=1 && dt.day<=6){
      if(!map[dt.day]) map[dt.day]=[];
      data.timeLabel=fmtHour(dt.hour);
      map[dt.day].push(data);
    }
  }

  var map={};

  if(key==='mino'){
    hdrColor='#1A3A1A'; title='Minocycline (미노씬캡슐) Day 1-6';
    addToMap(map,0,{dose:'200 mg (초회 Loading Dose)',note:'물과 함께 · 누운 채 금지',ld:true});
    for(var h=12;h<=120;h+=12)
      addToMap(map,h,{dose:'100 mg',note:'물과 함께 · 누운 채 복용 금지',ld:false});
  }
  else if(key==='vanco_po'){
    hdrColor='#1A3A5C'; title='Vancomycin PO (반코진캡슐) Day 1-6';
    for(var h=0;h<=120;h+=6)
      addToMap(map,h,{dose:'125-250 mg',note:'Clostridioides difficile 장염',ld:h===0});
  }
  else if(key==='fluco'){
    hdrColor='#5C1A3A'; title='Fluconazole (푸루나졸정) Day 1-6';
    var d1,dr,intv;
    if(crcl>=50&&sev){d1='400 mg (LD)';dr='400 mg';intv=24;}
    else if(crcl>=50){d1='200 mg (LD)';dr='100-200 mg';intv=24;}
    else if(crcl>=20){d1='200 mg (LD)';dr='100 mg (감량)';intv=24;}
    else{d1='100 mg';dr='100 mg';intv=48;}
    addToMap(map,0,{dose:d1,note:'초회 복용',ld:true});
    for(var h=intv;h<=120;h+=intv)
      addToMap(map,h,{dose:dr,note:intv===48?'q48h 격일':'q24h | 식사 무관',ld:false});
  }
  else if(key==='metro'){
    hdrColor='#3A3A1A'; title='Metronidazole (후라시닐정) Day 1-6';
    for(var h=0;h<=120;h+=8)
      addToMap(map,h,{dose:'500 mg (2정)',note:'식사 중 · 음주 금지',ld:h===0});
  }

  for(var d=1;d<=6;d++){
    var ent=map[d];
    if(ent&&ent.length){
      var hasLD=ent.some(function(e){return e.ld;});
      var doseHtml='';
      ent.forEach(function(e){
        doseHtml+='<strong>'+e.timeLabel+'</strong> - '+e.dose+'<br>';
      });
      rows.push({d:d,doseHtml:doseHtml,note:ent[0].note,
        bg:hasLD?'#FFF8E8':'#F0F4FA',col:hasLD?'#9a5a00':hdrColor});
    } else {
      rows.push({d:d,doseHtml:'<span style="color:#bbb">-</span>',
        note:'복용 없음',bg:'#FAFAFA',col:'#bbb'});
    }
  }

  if(!rows.length) return '';

  var rh='';
  rows.forEach(function(r){
    rh+='<tr style="background:'+r.bg+'">'
      +'<td style="font-weight:700;color:'+r.col+';white-space:nowrap;padding:6px 5px;border-bottom:.5px solid #E8EEF4;font-size:11px;vertical-align:middle;width:44px">Day '+r.d+'</td>'
      +'<td style="color:'+r.col+';padding:6px 5px;border-bottom:.5px solid #E8EEF4;font-size:11px;word-break:keep-all;vertical-align:top;line-height:1.5">'+r.doseHtml+'</td>'
      +'<td style="color:#555;padding:6px 5px;border-bottom:.5px solid #E8EEF4;font-size:10px;word-break:keep-all;overflow-wrap:break-word;vertical-align:top;line-height:1.45">'+r.note+'</td>'
      +'</tr>';
  });

  var html='<div class="po-sched">'
    +'<div class="po-sched-ttl" style="background:'+hdrColor+'">&#128197; '+title+'</div>'
    +'<table class="po-tbl" style="table-layout:fixed;width:100%">'
    +'<thead><tr>'
    +'<th style="color:'+hdrColor+';border-bottom:1.5px solid '+hdrColor+';text-align:left;padding:5px;font-size:10px;width:44px">Day</th>'
    +'<th style="color:'+hdrColor+';border-bottom:1.5px solid '+hdrColor+';text-align:left;padding:5px;font-size:10px">복용 시각 · 용량</th>'
    +'<th style="color:'+hdrColor+';border-bottom:1.5px solid '+hdrColor+';text-align:left;padding:5px;font-size:10px;width:35%">비고</th>'
    +'</tr></thead>'
    +'<tbody>'+rh+'</tbody></table>'
    +'<div style="display:flex;gap:8px;padding:5px 8px;font-size:10px;background:#FAFAFA;border-top:.5px solid #eee;flex-wrap:wrap">'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:#FFF8E8;border:1px solid #9a5a00;flex-shrink:0"></span><span style="color:#9a5a00;font-weight:700">초회/Loading Dose (LD)</span></span> '
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:#F0F4FA;border:1px solid #1B3A5C;flex-shrink:0"></span><span style="color:#555">유지 복용</span></span> '
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:#FAFAFA;border:1px solid #bbb;flex-shrink:0"></span><span style="color:#aaa">복용 없음</span></span>'
    +'</div></div>';
  return html;
}


/* ═══ ABSOLUTE TIME HELPER ═══════════════════════════════════════════════
   offsetToDateTime(startH, offsetH)
   → startH: 0-23 (hour when first dose is given on Day 1)
   → offsetH: hours elapsed since that first dose
   Returns {day:1-6, hour:0-23, label:'오전/오후 N시'}
═══════════════════════════════════════════════════════════════════════════ */
function offsetToDateTime(startH, offsetH){
  var absH = startH + offsetH;
  var day  = Math.floor(absH / 24) + 1;
  var hour = absH % 24;
  var ap   = hour < 12 ? '오전' : '오후';
  var h12  = hour % 12 || 12;
  return {day: day, hour: hour, label: ap + ' ' + h12 + '시'};
}

function buildDaySched(key,crcl,sev,startH){
  var rows=[], hdrColor='#1B3A5C', title='';
  if(key==='teico') return '';

  /* ── LEVOFLOXACIN ─────────────────────────────────────────────────── */
  if(key==='levo'){
    hdrColor='#6E3A00';
    title='Levofloxacin (레보카신주) Day별 투여 스케줄';

    // Determine dose string and infusion note by CrCl/severity
    var doseStr, infNote, interval; // interval in hours
    if(crcl>=50 && sev){
      doseStr='750 mg'; infNote='750 mg/150 mL RTU 백 → 90분 IV'; interval=24;
    } else if(crcl>=50){
      doseStr='500 mg'; infNote='500 mg/100 mL RTU 백 → 60분 IV'; interval=24;
    } else if(crcl>=20){
      // Day1 초회 750 mg, 이후 500 mg q24h
      interval=24;
    } else if(crcl>=10){
      doseStr='750 mg'; infNote='750 mg/150 mL RTU 백 → 90분 IV'; interval=48;
    } else {
      doseStr='500 mg'; infNote='500 mg/100 mL RTU 백 → 60분 IV'; interval=48;
    }

    // Build dose times using absolute time
    var doseTimes=[]; // [{offsetH, dose, note, isFirst}]
    if(crcl>=20 && crcl<50){
      // First dose 750mg, then 500mg q24h
      doseTimes.push({off:0,  dose:'750 mg (초회 Loading Dose)', note:'750 mg/150 mL RTU 백 → 90분 IV', first:true});
      for(var h=24; h<=120; h+=24)
        doseTimes.push({off:h, dose:'500 mg', note:'500 mg/100 mL RTU 백 → 60분 IV', first:false});
    } else {
      var isFirst=true;
      for(var h=0; h<=120; h+=interval){
        doseTimes.push({off:h, dose:isFirst?(doseStr+' (초회 Loading Dose)'):doseStr, note:infNote, first:isFirst});
        isFirst=false;
      }
    }

    // Group by day
    var dayMap={};
    doseTimes.forEach(function(dt){
      var info=offsetToDateTime(startH, dt.off);
      if(info.day>=1 && info.day<=6){
        if(!dayMap[info.day]) dayMap[info.day]=[];
        dayMap[info.day].push({time:info.label, dose:dt.dose, note:dt.note, first:dt.first});
      }
    });

    for(var d=1; d<=6; d++){
      var entries=dayMap[d];
      if(entries && entries.length){
        var isLD=entries.some(function(e){return e.first;});
        var doseHtml=entries.map(function(e){
          return '<strong>'+e.time+'</strong> — '+e.dose;
        }).join('<br>');
        var noteHtml=entries[0].note;
        rows.push({d:d, doseHtml:doseHtml, note:noteHtml,
          bg:isLD?'#FFF8E8':'#F0F4FA', col:isLD?'#9a5a00':'#6E3A00'});
      } else {
        // No dose this day
        rows.push({d:d, doseHtml:'<span style="color:#bbb">—</span>',
          note:'투여 없음 ('+interval+'h 간격)', bg:'#FAFAFA', col:'#bbb'});
      }
    }

  /* ── GENTAMICIN ───────────────────────────────────────────────────── */
  } else if(key==='genta'){
    hdrColor='#4A1B0C';
    title='Gentamicin (겐타마이신주) Day별 스케줄<br>— Therapeutic Drug Monitoring (TDM) 필수';

    // Determine interval by CrCl
    var interval=crcl>=60?24:crcl>=40?36:crcl>=20?48:0;
    if(interval===0){ return ''; }

    var peakGoal=sev?'Peak ≥ 10 mg/L':'Peak 8–10 mg/L';
    var tdmNote='★ Therapeutic Drug Monitoring (TDM) — Trough 채혈 (투여 직전)';

    // Build dose times
    var doseTimes=[];
    var isFirst=true;
    for(var h=0; h<=130; h+=interval){
      doseTimes.push({off:h, first:isFirst});
      isFirst=false;
    }

    // Group by day
    var dayMap={};
    doseTimes.forEach(function(dt,idx){
      var info=offsetToDateTime(startH, dt.off);
      if(info.day>=1 && info.day<=6){
        if(!dayMap[info.day]) dayMap[info.day]=[];
        // Mark Day 4 (4th dose) for TDM
        dayMap[info.day].push({time:info.label, first:dt.first, doseNum:idx+1});
      }
    });

    for(var d=1; d<=6; d++){
      var entries=dayMap[d];
      if(entries && entries.length){
        var isLD=entries.some(function(e){return e.first;});
        // Check if any is 4th dose (TDM day)
        var isTDM=entries.some(function(e){return e.doseNum===4;});
        var timeLabels=entries.map(function(e){
          return '<strong>'+e.time+'</strong>';
        }).join(', ');
        var noteStr='NS 100 mL · 30분 IV | '+peakGoal;
        if(isTDM) noteStr+='\n'+tdmNote;
        rows.push({d:d,
          doseHtml:timeLabels+'<br>80 mg × 2앰플',
          note:noteStr.replace('\n','<br>'),
          bg:isTDM?'#FEF8EE':isLD?'#FFF8E8':'#F0F4FA',
          col:isTDM?'#9a5a00':isLD?'#9a5a00':'#4A1B0C'});
      } else {
        rows.push({d:d,
          doseHtml:'<span style="color:#bbb">—</span>',
          note:'투여 없음 (q'+interval+'h 간격)',
          bg:'#FAFAFA', col:'#bbb'});
      }
    }

  /* ── FLUCONAZOLE (IV-like schedule, q24h or q48h) ─────────────────── */
  } else if(key==='fluco'){
    hdrColor='#5C1A3A';
    title='Fluconazole (푸루나졸정) Day별 복용 스케줄';
    var d1,dr,n1,nr,interval;
    if(crcl>=50&&sev){d1='400 mg (LD)';dr='400 mg';n1='초회 복용 (침습 칸디다)';nr='오전 9시 q24h';interval=24;}
    else if(crcl>=50){d1='200 mg (LD)';dr='100–200 mg';n1='초회 복용';nr='오전 9시 q24h';interval=24;}
    else if(crcl>=20){d1='200 mg (LD)';dr='100 mg (감량)';n1='초회 복용';nr='오전 9시 q24h';interval=24;}
    else{d1='100 mg';dr='100 mg';n1='오전 9시';nr='격일 q48h';interval=48;}
    var doseTimes=[{off:0,first:true,dose:d1,note:n1}];
    var done=false;
    for(var h=interval;h<=120;h+=interval)
      doseTimes.push({off:h,first:false,dose:dr,note:nr});
    var dayMap={};
    doseTimes.forEach(function(dt){
      var info=offsetToDateTime(startH,dt.off);
      if(info.day>=1&&info.day<=6){
        if(!dayMap[info.day])dayMap[info.day]=[];
        dayMap[info.day].push({time:info.label,dose:dt.dose,note:dt.note,first:dt.first});
      }
    });
    for(var d=1;d<=6;d++){
      var entries=dayMap[d];
      if(entries&&entries.length){
        var isLD=entries.some(function(e){return e.first;});
        rows.push({d:d,
          doseHtml:entries.map(function(e){return '<strong>'+e.time+'</strong> — '+e.dose;}).join('<br>'),
          note:entries[0].note,bg:isLD?'#FFF8E8':'#F0F4FA',col:isLD?'#9a5a00':'#5C1A3A'});
      } else {
        rows.push({d:d,doseHtml:'<span style="color:#bbb">—</span>',
          note:'복용 없음 (q'+interval+'h 간격)',bg:'#FAFAFA',col:'#bbb'});
      }
    }
  }

  if(!rows.length) return '';

  /* ── RENDER TABLE ─────────────────────────────────────────────────── */
  var rowHtml=rows.map(function(r){
    return '<tr style="background:'+r.bg+'">'+
      '<td style="font-weight:700;color:'+r.col+';white-space:nowrap;padding:6px 5px;border-bottom:.5px solid #E8EEF4;font-size:11px;vertical-align:middle;width:44px">Day '+r.d+'</td>'+
      '<td style="color:'+r.col+';padding:6px 5px;border-bottom:.5px solid #E8EEF4;font-size:11px;word-break:keep-all;vertical-align:top;line-height:1.5">'+r.doseHtml+'</td>'+
      '<td style="color:#555;padding:6px 5px;border-bottom:.5px solid #E8EEF4;font-size:10px;word-break:keep-all;overflow-wrap:break-word;vertical-align:top;line-height:1.45">'+r.note+'</td>'+
    '</tr>';
  }).join('');

  return '<div class="day-sched" style="border-color:'+hdrColor+'">'+
    '<div class="day-sched-ttl" style="background:'+hdrColor+'">&#128197; '+title+'</div>'+
    '<table class="day-tbl" style="table-layout:fixed;width:100%">'+
    '<thead><tr>'+
      '<th style="color:'+hdrColor+';border-bottom:1.5px solid '+hdrColor+';text-align:left;padding:5px 5px;font-size:10px;width:44px">Day</th>'+
      '<th style="color:'+hdrColor+';border-bottom:1.5px solid '+hdrColor+';text-align:left;padding:5px 5px;font-size:10px">투여 시각 · 용량</th>'+
      '<th style="color:'+hdrColor+';border-bottom:1.5px solid '+hdrColor+';text-align:left;padding:5px 5px;font-size:10px;width:38%">투여 방법 / 비고</th>'+
    '</tr></thead>'+
    '<tbody>'+rowHtml+'</tbody></table>'+
    '<div class="day-leg">'+
      '<div class="dl-i"><div class="dl-dot" style="background:#FFF8E8;border:1px solid #9a5a00"></div><span style="color:#9a5a00;font-weight:700">LD (Loading Dose, 초회)</span></div>'+
      '<div class="dl-i"><div class="dl-dot" style="background:#F0F4FA;border:1px solid #1B3A5C"></div><span style="color:#555">MD (Maintenance Dose)</span></div>'+
      '<div class="dl-i"><div class="dl-dot" style="background:#FAFAFA;border:1px solid #bbb"></div><span style="color:#aaa">투여 없음</span></div>'+
      '<div class="dl-i"><div class="dl-dot" style="background:#FEF8EE;border:1px solid #D4780A"></div><span style="color:#9a5a00;font-weight:700">★ TDM 채혈일</span></div>'+
    '</div></div>';
}

/* ═══════════════════════ TEICO SCHEDULE ══════════════════════════════════ */
function buildTeico(crcl,sev,startH){
  var md,mdiHours,mdl,vial;
  if(crcl>=60){
    if(sev){md=400;mdiHours=12;mdl='q12h (중증)';vial='400 mg × 1바이알';}
    else{md=400;mdiHours=24;mdl='q24h';vial='400 mg × 1바이알';}
  } else if(crcl>=40){md=400;mdiHours=48;mdl='q48h';vial='400 mg × 1바이알';}
  else if(crcl>=10){md=400;mdiHours=72;mdl='q72h';vial='400 mg × 1바이알';}
  else{md=200;mdiHours=72;mdl='q72h';vial='200 mg × 1바이알';}

  // offsetH = 시작 투여시각으로부터 흐른 시간(시간 단위)
  var ldOffsets=[0,12,24], mdOffsets=[];
  for(var t=48;t<=144;t+=mdiHours) mdOffsets.push(t);

  // 절대시각(시작시각+offset)을 실제 달력일(Day)과 시각으로 변환
  // 다른 스케줄 함수들(offsetToDateTime, buildPOSched의 getDay)과 동일한 규칙 사용:
  //   absHour = startH + offsetH
  //   day  = Math.floor(absHour/24) + 1   (1부터 시작)
  //   hour = absHour % 24
  function toDayHour(offsetH){
    var absH=startH+offsetH;
    return {day:Math.floor(absH/24)+1, hour:absH%24};
  }
  function fmtH(h){var ap=h<12?'오전':'오후',h12=h%12||12;return ap+' '+h12+'시';}

  // 1~6일자별로 그날 발생하는 모든 투여(LD/MD)를 모음
  var dayMap={};
  function addDose(offsetH, tp, mg){
    var dt=toDayHour(offsetH);
    if(dt.day<1||dt.day>6) return; // Day 6 이후는 표 밖
    if(!dayMap[dt.day]) dayMap[dt.day]=[];
    dayMap[dt.day].push({tp:tp,hour:dt.hour,mg:mg});
  }
  ldOffsets.forEach(function(off){ addDose(off,'LD',400); });
  mdOffsets.forEach(function(off){ addDose(off,'MD',md); });

  function fd(d){
    var ts=fmtH(d.hour);
    if(d.tp==='LD') return '<span class="td-ld">'+d.mg+' mg<br><small>Loading Dose (LD) ('+ts+')</small></span>';
    return '<span class="td-md">'+d.mg+' mg<br><small>Maintenance Dose (MD) ('+ts+')</small></span>';
  }

  var rows='';
  for(var dayNum=1; dayNum<=6; dayNum++){
    var ds=(dayMap[dayNum]||[]).slice().sort(function(a,b){return a.hour-b.hour;});
    var hLD=ds.some(function(d){return d.tp==='LD';});
    var hMD=ds.some(function(d){return d.tp==='MD';});
    var bg=hLD?'#FFF8E8':hMD?'#F0FAF4':'#FAFAFA';
    var cell=ds.length?ds.map(fd).join('<br>'):'<span class="td-no">—</span>';
    var tot=ds.reduce(function(s,d){return s+d.mg;},0);
    rows+='<tr style="background:'+bg+'"><td>Day '+dayNum+'</td><td>'+cell+'</td>'+
      '<td>'+(ds.length?ds.length+'회':'<span class="td-no">—</span>')+'</td>'+
      '<td>'+(tot?'<strong>'+tot+' mg</strong>':'<span class="td-no">—</span>')+'</td></tr>';
  }

  var ld1=toDayHour(0), ld2=toDayHour(12), ld3=toDayHour(24);
  return '<div class="teico-wrap"><div class="teico-ttl">&#9827; 테이코플라닌 Day별 투여 스케줄 (Day 1–6)'+(sev?'<br>— 중증 기준 (MD q12h)':'')+' </div>'+
    '<table class="teico-tbl"><thead><tr><th>일자</th><th>투여 시각 및 용량</th><th>횟수</th><th>일일 합계</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table>'+
    '<div class="teico-leg">'+
    '<div class="tl-i"><div class="tl-dot" style="background:#FFF8E8;border:1px solid #9a5a00"></div><span style="color:#9a5a00;font-weight:700">Loading Dose (LD) 400 mg</span></div>'+
    '<div class="tl-i"><div class="tl-dot" style="background:#F0FAF4;border:1px solid #1A7A3C"></div><span style="color:#1A7A3C;font-weight:700">Maintenance Dose (MD) '+mdl+'</span></div>'+
    '<div class="tl-i" style="margin-left:auto"><span style="color:#1A5C3B;font-weight:600">'+vial+'</span></div>'+
    '</div>'+
    '<div class="teico-note">'+
    '※ Loading Dose (LD): 빠르게 목표 혈중 농도 달성을 위한 초회 고용량<br>'+
    '※ Maintenance Dose (MD): 목표 농도를 지속 유지하기 위한 정기 투여량<br>'+
    '※ Loading 시작: Day '+ld1.day+' '+fmtH(ld1.hour)+' 기준 → 1회차: Day '+ld1.day+' '+fmtH(ld1.hour)+' / 2회차: Day '+ld2.day+' '+fmtH(ld2.hour)+' / 3회차: Day '+ld3.day+' '+fmtH(ld3.hour)+'<br>'+
    '※ Therapeutic Drug Monitoring (TDM): Loading Dose 3회 후 4번째 투여 직전 trough 채혈 → 목표 15–30 mg/L<br>'+
    '※ 빈칸(—) = 해당 일자 투여 없음 ('+mdl+' 간격)</div></div>';
}

/* ═══════════════════════ RENDER DRUG CARD ════════════════════════════════ */
function rdr(key,crcl,sev,uid){
  var d=D[key];if(!d)return'';
  var r=d.dose(crcl,sev);
  var tc=r.p==='ok'?'bOK':r.p==='wn'?'bWN':'bER';
  var pc=d.pkpd.indexOf('Concentration')>=0?'bPU':d.pkpd.indexOf('AUC')>=0?'bBL':'bGR';
  var ec=d.elim.indexOf('신장')>=0?'bWN':'bGR';
  var steps=(r.inf||[]).map(function(s){return '<div class="inf-row">'+s+'</div>';}).join('');
  var ibox=steps?'<div class="inf-box"><div class="inf-ttl">투여 방법 및 희석</div>'+steps+'</div>':'';
  var sebox='<div class="se-box"><div class="se-ttl">⚠ 주요 부작용</div>'+(d.se||[]).map(function(s){return '<div class="se-row">'+s+'</div>';}).join('')+'</div>';
  var qt=d.qtc?'<span class="badge bQT">⚠ QTc 모니터링 필요</span>':'';
  var tdmb=r.tdm?'<span class="badge bQT">Therapeutic Drug Monitoring (TDM) 필수</span>':'';
  var tdmn=r.tdm&&r.tdmNote?'<div class="note-box" style="border-left:3px solid #C0392B;color:#8B1A1A"><strong>Therapeutic Drug Monitoring (TDM):</strong> '+r.tdmNote+'</div>':'';
  var adm=d.adm?'<div class="note-box"><strong>복용법:</strong> '+d.adm+'</div>':'';
  var dnote=r.note?'<div class="note-box" style="border-left:3px solid #3A1B5C;color:#3A1B5C">'+r.note+'</div>':'';
  var zb='';
  if(r.zerb&&r.zn){
    zb='<div class="zerb-box"><div class="zerb-ttl">💊 저박사 Zerbaxa 바이알 분할 보관 안내</div>'+
      '<div class="zerb-row">1바이알을 멸균증류수 10 mL로 재구성 (Reconstitute, 약 11.4 mL 용액)</div>'+
      '<div class="zerb-row">필요 용량 (5.7 mL OR 11.4 mL)만 NS 100 mL백에 추가 후 즉시 주입</div>'+
      '<div class="zerb-row">나머지 재구성한 Zerbaxa: 냉장(2–8°C) 24시간 안정 → 다음 q8h 투여 시 사용 가능</div>'+
      '<div class="zerb-row">NS 100 mL백에 희석한 Zerbaxa는 냉장(2–8°C)에서 7일간 유효</div></div>';
  }
  /* severity badge */
  var sevBg=sev?'background:rgba(139,26,26,0.25)':'background:rgba(26,92,59,0.25)';
  var sevTxt=sev?'🔴 중증 감염 기준':'🟡 일반/경증 감염 기준';
  /* time picker */
  var timePicker='';
  if(d.hasTimePicker){
    var isGreen=d.timePickerColor==='green';
    var tpId='tp_'+uid;
    var btnCol=isGreen?'#1A5C3B':'#9a5a00', brdCol=isGreen?'#1A5C3B':'#D4780A';
    timePicker=buildTimePicker(key,crcl,sev,uid,d.timePickerColor);
  }
  var schedHtml='';
  if(key==='teico'){
    schedHtml='<div id="sched_'+uid+'">'+buildTeico(crcl,sev,9)+'</div>';
  } else if(d.hasTimePicker){
    schedHtml='<div id="sched_'+uid+'">'+buildDaySched(key,crcl,sev,9)+'</div>';
  } else {
    // Compact PO schedule for selected drugs
    var PO_COMPACT=['mino','vanco_po','fluco','metro'];
    if(PO_COMPACT.indexOf(key)>=0){
      // PO drugs also get a time picker
      var tpId2='tp_'+uid;
      var btnCol2='#1A5C3B';
      timePicker=buildTimePicker(key,crcl,sev,uid,'green');
            var ps=buildPOSched(key,crcl,sev,9);
      if(ps) schedHtml='<div id="sched_'+uid+'">'+ps+'</div>';
    }
  }
  return '<div class="result-card" id="card_'+uid+'" data-key="'+key+'" data-crcl="'+crcl+'" data-sev="'+sev+'">'+
    '<div class="rc-hdr" style="background:'+d.hdr+'">'+
      '<div class="rc-name">'+d.name+'</div>'+
      '<div class="rc-eng">'+d.kname+' · '+(d.vial||d.form||'')+'</div>'+
      '<div class="rc-sev-badge" style="'+sevBg+'">'+sevTxt+'</div>'+
    '</div>'+
    '<div class="rc-body">'+
      '<div class="ir"><span class="ir-lbl">1회 용량</span><span class="ir-val">'+r.d+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">투여 간격</span><span class="ir-val">'+r.f+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">1일 총량</span><span class="ir-val">'+r.t+'</span></div>'+
      '<div style="margin:7px 0 5px">'+
        '<span class="badge '+tc+'">'+r.pt+'</span>'+
        '<span class="badge '+pc+'">'+d.pkpd.split('(')[0].trim().split(' ')[0]+'-dep</span>'+
        '<span class="badge '+ec+'">'+d.elim.split('(')[0].trim().split('·')[0].trim()+' 배설</span>'+
        qt+tdmb+
      '</div>'+
      '<div class="ir"><span class="ir-lbl">PK/PD</span><span class="ir-val" style="font-size:11px;color:#555">'+d.pkpd+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">반감기 (t½)</span><span class="ir-val" style="font-size:11px;color:#333;font-weight:600;word-break:keep-all;line-height:1.5">'+d.halflife+'</span></div>'+
      '<div class="ir"><span class="ir-lbl">배설 경로</span><span class="ir-val" style="font-size:11px;color:#555">'+d.elim+'</span></div>'+
      ibox+adm+dnote+tdmn+zb+sebox+timePicker+schedHtml+
    '</div></div>';
}

function updateSched(key,crcl,sev,uid){
  try{
    var tEl=document.getElementById('tp_'+uid);
    if(!tEl)return;
    var raw=(tEl.value||'').trim();
    var startH=9, startM=0;
    var m=raw.match(/^(\d{1,2}):(\d{2})/);
    if(m){
      startH=parseInt(m[1],10);
      startM=parseInt(m[2],10);
      if(/pm/i.test(raw) && startH<12) startH+=12;
      if(/am/i.test(raw) && startH===12) startH=0;
    }
    if(isNaN(startH)||startH<0||startH>23) startH=9;
    var el=document.getElementById('sched_'+uid);
    if(!el)return;
    var PO_COMPACT=['mino','vanco_po','fluco','metro'];
    if(key==='teico') el.innerHTML=buildTeico(crcl,sev,startH);
    else if(PO_COMPACT.indexOf(key)>=0) el.innerHTML=buildPOSched(key,crcl,sev,startH);
    else el.innerHTML=buildDaySched(key,crcl,sev,startH);
  } catch(err){
    console.error('updateSched error:', err);
    alert('스케줄 업데이트 중 오류가 발생했습니다: '+err.message);
  }
}

/* ═══════════════════════ CALCULATE ══════════════════════════════════════ */
function calculate(){
  var a=parseFloat(document.getElementById('age').value);
  var c=parseFloat(document.getElementById('cr').value);
  var w=parseFloat(document.getElementById('wt').value);
  if(!a||a<18){alert('나이를 입력해주세요');return;}
  if(!sex){alert('성별을 선택해주세요');return;}
  if(!c||c<=0){alert('Cr 수치를 입력해주세요');return;}
  if(!w||w<20){alert('체중을 입력해주세요');return;}
  if(severeMode===null){alert('감염 중증도를 선택해주세요\n(중증 감염 또는 일반/경증 감염)');return;}
  var male=sex==='M', ibw=calcIBW(male), wt=w<=ibw?w:ibw;
  var crcl=Math.round(calcCG(a,c,wt,male)*10)/10;
  lastCrcl=crcl;
  var panel=document.getElementById('crclPanel');
  panel.className='crcl-panel show';
  document.getElementById('crclNum').textContent=crcl;
  var eg=Math.round(calcEGFR(a,c,male)*10)/10;
  document.getElementById('egfrNum').textContent=eg;
  document.getElementById('crclStage').textContent=crclStageEN(crcl);
  document.getElementById('egfrStage').textContent=egfrStageEN(eg);
  document.getElementById('crclInfo').textContent='IBW '+ibw+' kg'+(w>ibw?' → IBW 적용':' → ABW '+w+' kg 적용');
  var keys=[document.getElementById('iv1').value,document.getElementById('iv2').value,
    document.getElementById('iv3').value,document.getElementById('po1').value].filter(function(v){return v;});
  if(!keys.length){alert('항생제를 하나 이상 선택해주세요');return;}
  var html='';
  keys.forEach(function(k){var uid='u'+(++UID);html+=rdr(k,crcl,severeMode,uid);});
  html+='<button class="reset-btn" onclick="resetAll()">↺ 다시 계산하기</button>';
  document.getElementById('results').innerHTML=html;
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function resetAll(){
  ['age','cr','wt'].forEach(function(id){document.getElementById(id).value='';});
  ['iv1','iv2','iv3','po1'].forEach(function(id){document.getElementById(id).selectedIndex=0;});
  sex=null;severeMode=null;lastCrcl=null;
  document.getElementById('bm').className='sb';
  document.getElementById('bf').className='sb';
  document.getElementById('btn-sev').className='sev-btn';
  document.getElementById('btn-mild').className='sev-btn';
  document.getElementById('crclPanel').className='crcl-panel';
  // teico time box removed from top
  document.getElementById('results').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}
